services:
  tapehoard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tapehoard
    ports:
      - "8000:8000"
    volumes:
      - ./db:/database
      - ./staging:/staging
      - /Users/alamers/git:/source_data:ro
      - /Users/alamers/restore:/restores
    # Uncomment to enable LTO tape drive support
    # devices:
    #   - /dev/nst0:/dev/nst0
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    restart: unless-stopped
