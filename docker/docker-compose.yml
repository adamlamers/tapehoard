services:
  tapehoard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tapehoard
    ports:
      - "8000:8000"
    volumes:
      - ./db:/database
      - ./staging:/staging
      - /Users/alamers/git:/source_data:ro
      - /Users/alamers/restore:/restores
    # Uncomment to enable LTO tape drive support
    # devices:
    #   - /dev/nst0:/dev/nst0
    environment:
      - PUID=0
      - PGID=0
      - RUN_AS_ROOT=true
      - TZ=UTC
    user: "0:0"
    cap_add:
      - SYS_RAWIO
    restart: unless-stopped
